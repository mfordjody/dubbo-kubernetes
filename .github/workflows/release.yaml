name: Dubbo Kubernetes Release

on:
  push:
    tags:
      - '[0-9]*.[0-9]*.[0-9]*'

permissions:
  contents: write

jobs:
  create_release:
    name: Create Release
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Release content is maintained in releasenotes/<version>.md (the
      # single editable source); a missing file fails the release.
      - name: Verify and extract release notes
        env:
          TAG: ${{ github.ref_name }}
        run: |
          ./release/release-notes.sh verify "${TAG}"
          ./release/release-notes.sh extract-notes "${TAG}" > /tmp/release-body.md
          echo "Release body:"
          cat /tmp/release-body.md

      - name: Create GitHub Release if missing
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          if gh release view "${TAG}" >/dev/null 2>&1; then
            echo "Release ${TAG} already exists, skipping creation."
          else
            gh release create "${TAG}" \
              --title "${TAG}" \
              --prerelease \
              --notes-file /tmp/release-body.md
          fi

  build_and_upload:
    name: Build and Upload Binaries
    needs: create_release
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        goos: [linux, darwin, windows]
        goarch: [386, amd64, arm64]
        exclude:
          - goos: darwin
            goarch: 386
          - goos: windows
            goarch: arm64

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Download dependencies
        run: go mod download

      - name: Build dubboctl and samples
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          GIT_VERSION: ${{ github.ref_name }}
        run: |
          mkdir -p build/dubboctl
          make build-dubboctl GOOS="${GOOS}" GOARCH="${GOARCH}" GIT_VERSION="${GIT_VERSION}"
          make clone-sample
          cp README.md LICENSE build/
          cp README.md LICENSE build/dubboctl/
          mv bin/dubboctl* build/dubboctl/
          mv bin/samples/ build/
          ls -ln build/dubboctl/ ; ls -ln build/

      - name: Rename windows binary
        if: matrix.goos == 'windows'
        run: |
          cp build/dubboctl/dubboctl build/dubboctl/dubboctl.exe

      - name: Package dubboctl
        id: package_ctl
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          FILENAME="dubboctl-${VERSION}-${{ matrix.goos }}-${{ matrix.goarch }}"
          DIRNAME="dubboctl-${VERSION}"
          mkdir -p "${DIRNAME}/bin"
          cp build/dubboctl/dubboctl "${DIRNAME}/bin"
          cp build/dubboctl/README.md build/dubboctl/LICENSE "${DIRNAME}"
          ls -Rlh "${DIRNAME}"
          if [ "${{ matrix.goos }}" = "windows" ]; then
            zip -r "${FILENAME}.zip" "${DIRNAME}/bin"
            echo "name=${FILENAME}.zip" >> "$GITHUB_OUTPUT"
          else
            tar -czvf "${FILENAME}.tar.gz" "${DIRNAME}"
            echo "name=${FILENAME}.tar.gz" >> "$GITHUB_OUTPUT"
          fi

      - name: Package dubbo distribution
        id: package_dubbo
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          FILENAME="dubbo-${VERSION}-${{ matrix.goos }}-${{ matrix.goarch }}"
          DIRNAME="dubbo-${VERSION}"
          mkdir -p "${DIRNAME}/bin"
          cp build/dubboctl/dubboctl "${DIRNAME}/bin/"
          cp build/README.md build/LICENSE "${DIRNAME}"
          cp -r build/samples "${DIRNAME}"
          ls -Rlh "${DIRNAME}"
          if [ "${{ matrix.goos }}" = "windows" ]; then
            zip -r "${FILENAME}.zip" "${DIRNAME}"
            echo "name=${FILENAME}.zip" >> "$GITHUB_OUTPUT"
          else
            tar -czvf "${FILENAME}.tar.gz" "${DIRNAME}"
            echo "name=${FILENAME}.tar.gz" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate checksums
        run: |
          sha256sum "${{ steps.package_ctl.outputs.name }}" > "${{ steps.package_ctl.outputs.name }}.sha256"
          sha256sum "${{ steps.package_dubbo.outputs.name }}" > "${{ steps.package_dubbo.outputs.name }}.sha256"

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          gh release upload "${TAG}" --clobber \
            "${{ steps.package_ctl.outputs.name }}" \
            "${{ steps.package_ctl.outputs.name }}.sha256" \
            "${{ steps.package_dubbo.outputs.name }}" \
            "${{ steps.package_dubbo.outputs.name }}.sha256"

  # Opens a PR against the website repository that adds the release
  # announcement and bumps all embedded version numbers. Requires the
  # WEBSITE_SYNC_TOKEN secret (a token with write access to the website
  # repo); the job is skipped when the secret is not configured.
  sync_website:
    name: Sync Website Announcement
    needs: create_release
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      WEBSITE_SYNC_TOKEN: ${{ secrets.WEBSITE_SYNC_TOKEN }}
      WEBSITE_REPO: kdubbo/kdubbo.github.io
      TAG: ${{ github.ref_name }}
    steps:
      - name: Checkout code
        if: env.WEBSITE_SYNC_TOKEN != ''
        uses: actions/checkout@v4

      - name: Checkout website
        if: env.WEBSITE_SYNC_TOKEN != ''
        uses: actions/checkout@v4
        with:
          repository: kdubbo/kdubbo.github.io
          token: ${{ secrets.WEBSITE_SYNC_TOKEN }}
          path: website

      - name: Sync announcement and version numbers
        if: env.WEBSITE_SYNC_TOKEN != ''
        run: |
          ./release/sync-website.sh "${TAG}" website

      - name: Open website pull request
        if: env.WEBSITE_SYNC_TOKEN != ''
        env:
          GH_TOKEN: ${{ secrets.WEBSITE_SYNC_TOKEN }}
        run: |
          cd website
          if git diff --quiet; then
            echo "Website already up to date for ${TAG}; nothing to sync."
            exit 0
          fi
          BRANCH="release-announcement-${TAG}"
          git config user.name "dubbo-kubernetes-bot"
          git config user.email "dev@dubbo.apache.org"
          git checkout -b "${BRANCH}"
          git add -A
          git commit -m "Announce release ${TAG}"
          git push -f origin "${BRANCH}"
          gh pr create \
            --repo "${WEBSITE_REPO}" \
            --head "${BRANCH}" \
            --title "Announce release ${TAG}" \
            --body "Automated announcement + version bump for release ${TAG}, generated from releasenotes/${TAG}.md." \
            || echo "PR already exists"

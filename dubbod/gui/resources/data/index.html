<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <base href="{{ .BasePath }}/" />
  <title>Kdubbo Console</title>
  <link rel="icon" type="image/png" href="./dubbo-logo.png" />
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div id="root"></div>

  <script type="module">
    import { h, render } from 'https://esm.sh/preact';
    import { useState, useEffect, useMemo } from 'https://esm.sh/preact/hooks';
    import htm from 'https://esm.sh/htm';

    window.html = htm.bind(h);
    window.useState = useState;
    window.useEffect = useEffect;
    window.useMemo = useMemo;
    window.render = render;
  </script>

  <script id="dubbod-gui-config" type="application/json">{{ .ConfigJSON }}</script>
  <script src="./app.js" type="module"></script>
</body>
</html>
